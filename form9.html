<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Survey - Homework 9</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.6;
      margin: 24px;
      color: #222;
      background-color: #f4f7fb;
    }

    h1 {
      color: #1a365d;
      margin-bottom: 8px;
    }

    .intro {
      max-width: 640px;
      margin-bottom: 20px;
    }

    form {
      max-width: 640px;
      background-color: #ffffff;
      border: 2px solid #2b6cb0;
      border-radius: 8px;
      padding: 20px 24px 24px;
    }

    label {
      display: block;
      font-weight: 700;
      margin-top: 14px;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="email"],
    textarea,
    select {
      width: 100%;
      max-width: 100%;
      padding: 8px 10px;
      border: 1px solid #718096;
      border-radius: 4px;
      font-family: inherit;
      font-size: 1rem;
    }

    textarea {
      resize: vertical;
    }

    fieldset {
      margin-top: 18px;
      padding: 14px 16px 12px;
      border: 2px solid #2b6cb0;
      border-radius: 6px;
      background-color: #ebf4ff;
    }

    legend {
      font-weight: 700;
      padding: 0 8px;
      color: #1a365d;
    }

    .option {
      margin: 6px 0;
    }

    .option label {
      display: inline;
      font-weight: 400;
      margin: 0 0 0 6px;
    }

    .buttons {
      margin-top: 22px;
    }

    .buttons input {
      margin-right: 10px;
      padding: 8px 18px;
      font-size: 1rem;
      cursor: pointer;
    }

    input[type="submit"] {
      background-color: #2b6cb0;
      color: #fff;
      border: none;
      border-radius: 4px;
    }

    input[type="reset"] {
      background-color: #e2e8f0;
      border: 1px solid #718096;
      border-radius: 4px;
    }

    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: #2b6cb0;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <h1>Music Survey</h1>
  <p class="intro">
    Please complete this short survey about your music preferences.
  </p>

  <form action="http://www.uyar.com/teaching/ecc006/2017spring/login.php" method="post">
    <label for="name">Name:</label>
    <input type="text" id="name" name="name">

    <label for="email">E-mail:</label>
    <input type="email" id="email" name="email">

    <label for="comments">Comments about your favorite song or album:</label>
    <textarea id="comments" name="comments" rows="3" cols="60"></textarea>

    <fieldset>
      <legend>Please choose the type of music that you listen to most often:</legend>
      <div class="option">
        <input type="radio" id="pop" name="musicType" value="pop" checked>
        <label for="pop">Pop</label>
      </div>
      <div class="option">
        <input type="radio" id="rap" name="musicType" value="rap">
        <label for="rap">Rap</label>
      </div>
      <div class="option">
        <input type="radio" id="country" name="musicType" value="country">
        <label for="country">Country</label>
      </div>
      <div class="option">
        <input type="radio" id="otherGenre" name="musicType" value="other">
        <label for="otherGenre">Other</label>
      </div>
    </fieldset>

    <fieldset>
      <legend>Please indicate how you obtained your MP3s (check all that apply):</legend>
      <div class="option">
        <input type="checkbox" id="downloadPeers" name="mp3Source" value="peers">
        <label for="downloadPeers">Download from peers</label>
      </div>
      <div class="option">
        <input type="checkbox" id="purchaseItunes" name="mp3Source" value="itunes">
        <label for="purchaseItunes">Purchase from iTunes</label>
      </div>
      <div class="option">
        <input type="checkbox" id="ripCds" name="mp3Source" value="cds">
        <label for="ripCds">Rip from own CDs</label>
      </div>
      <div class="option">
        <input type="checkbox" id="otherSource" name="mp3Source" value="other">
        <label for="otherSource">Other</label>
      </div>
    </fieldset>

    <label for="purchaseMethod">Music Purchase Method:</label>
    <select id="purchaseMethod" name="purchaseMethod" size="3">
      <option value="itunes">iTunes</option>
      <option value="subscription">music subscription service</option>
      <option value="retail">purchase from retail store</option>
      <option value="none">I do not purchase MP3 files</option>
    </select>

    <div class="buttons">
      <input type="submit" value="Submit">
      <input type="reset" value="Reset">
    </div>
  </form>

  <a class="back-link" href="index.html">Back to homepage</a>
</body>
</html>
